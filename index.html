<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Synapses — Your AI Companion (ava frame fix)</title>
  <meta name="description" content="Synapses is an AI companion first — chat, voice, and memory with Ava. Plus tools, sourcing, and more when you need them." />

  <!-- App integration hooks (wire these when embedding / shipping) -->
  <meta name="synapses:app-entry" content="app.html" />
  <meta name="synapses:ava-phone" content="+18105250269" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            logo: ['Syne', 'sans-serif'],
          },
          colors: {
            syn: {
              bg: '#0a0a0f',
              accent: '#7c6af7',
              pink: '#e85d96',
              teal: '#00d9a8',
              muted: '#6b6b8a',
              word: '#d4d0ee',
            },
          },
        },
      },
    };
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      background: #000;
      color: #fff;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    #root { min-height: 100vh; background: #000; }

    /* Liquid glass — cinematic chrome */
    .liquid-glass {
      background: rgba(0, 0, 0, 0.4);
      background-blend-mode: luminosity;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: none;
      box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.1);
      position: relative;
      overflow: hidden;
    }
    .liquid-glass::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(
        180deg,
        rgba(255, 255, 255, 0.3) 0%,
        rgba(255, 255, 255, 0.1) 20%,
        rgba(255, 255, 255, 0) 40%,
        rgba(255, 255, 255, 0) 60%,
        rgba(255, 255, 255, 0.1) 80%,
        rgba(255, 255, 255, 0.3) 100%
      );
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .liquid-glass-strong {
      background: rgba(255, 255, 255, 0.01);
      background-blend-mode: luminosity;
      backdrop-filter: blur(50px);
      -webkit-backdrop-filter: blur(50px);
      border: none;
      box-shadow: 4px 4px 4px rgba(0, 0, 0, 0.05), inset 0 1px 1px rgba(255, 255, 255, 0.15);
      position: relative;
      overflow: hidden;
    }
    .liquid-glass-strong::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1.4px;
      background: linear-gradient(
        180deg,
        rgba(255, 255, 255, 0.5) 0%,
        rgba(255, 255, 255, 0.2) 20%,
        rgba(255, 255, 255, 0) 40%,
        rgba(255, 255, 255, 0) 60%,
        rgba(255, 255, 255, 0.2) 80%,
        rgba(255, 255, 255, 0.5) 100%
      );
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    /*
      Companion portrait — based on future page 3/4 (phone) ratio.
      Fix side black bars by making the frame thinner (not by heavy scale).
      Keep iPhone ratio; absorb mismatch by cropping a little from the BOTTOM only.
    */
    .features-ambient {
      background:
        radial-gradient(ellipse 70% 55% at 85% 15%, rgba(124, 106, 247, 0.22) 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 10% 80%, rgba(0, 217, 168, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse 80% 60% at 50% 100%, rgba(67, 56, 202, 0.12) 0%, transparent 55%),
        #050508;
    }

    /* Centered hero cluster: copy + phone sit together in the middle */
    .ava-hero-cluster {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.75rem;
      width: 100%;
      max-width: 920px;
      margin: 0 auto;
    }
    @media (min-width: 900px) {
      .ava-hero-cluster {
        flex-direction: row;
        align-items: center;
        gap: 2rem; /* pull text + phone close */
      }
    }
    .ava-hero-copy {
      flex: 1 1 auto;
      max-width: 380px;
      text-align: center;
    }
    @media (min-width: 900px) {
      .ava-hero-copy {
        text-align: left;
      }
    }
    .ava-stage {
      position: relative;
      flex-shrink: 0;
      /* Size for readable face; side bars killed by crop below, not by fat frame */
      width: min(290px, 70vw);
    }
    .ava-portrait-frame {
      position: relative;
      width: 100%;
      aspect-ratio: 9 / 16;
      border-radius: 1.35rem;
      overflow: hidden; /* clips L/R black strips you circled */
      background: #000;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.12),
        0 28px 90px rgba(0, 0, 0, 0.6),
        0 0 70px rgba(124, 106, 247, 0.18);
    }
    /*
      builtaround.png: black bars are thin vertical gutters on L/R of the phone UI.
      Crop only horizontally a bit + a touch from bottom — keep S2S green icons.
    */
    .ava-portrait-frame video {
      position: absolute;
      left: 50%;
      top: 0;
      width: 112%;
      height: 106%;
      transform: translateX(-50%);
      object-fit: cover;
      object-position: center 10%;
      display: block;
    }
    /* Hairline ring only — no thick glass padding (that looked like extra black edge) */
    .ava-phone-chrome {
      border-radius: 1.45rem;
      padding: 1px;
      background: rgba(255, 255, 255, 0.08);
    }
    .ava-portrait-fade {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      background: linear-gradient(
        to top,
        rgba(5, 5, 8, 0.55) 0%,
        rgba(5, 5, 8, 0.08) 22%,
        transparent 40%
      );
    }
    .ava-caption {
      margin-top: 12px;
      text-align: center;
      padding: 0 2px;
    }
    .ava-caption-name {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: -0.02em;
      color: #fff;
      line-height: 1.2;
    }
    .ava-caption-sub {
      margin-top: 4px;
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 12.5px;
      color: rgba(255, 255, 255, 0.45);
      line-height: 1.4;
    }
  </style>
</head>
<body class="bg-black font-sans">
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel">
    const { useRef, useState, useEffect } = React;

    /* ── App entry points — change these when wiring into the real app ── */
    const APP = {
      open: '../synapses (5).html',           // main app HTML
      avaPhone: 'tel:+18105250269',
      features: '#features',
      tools: '#features',
      jobs: '#features',
      pricing: '#cta',
    };

    /* ── Shared motion primitives ── */
    function FadeIn({ delay = 0, duration = 1000, className = '', children }) {
      const [visible, setVisible] = useState(false);
      useEffect(() => {
        const t = setTimeout(() => setVisible(true), delay);
        return () => clearTimeout(t);
      }, [delay]);
      return (
        <div
          className={`transition-opacity ${className}`}
          style={{ opacity: visible ? 1 : 0, transitionDuration: `${duration}ms` }}
        >
          {children}
        </div>
      );
    }

    function AnimatedHeading({ text, className = '', style = {} }) {
      const CHAR_DELAY = 30;
      const INITIAL_DELAY = 200;
      const TRANSITION_MS = 500;
      const lines = text.split('\n');
      const [started, setStarted] = useState(false);

      useEffect(() => {
        const t = setTimeout(() => setStarted(true), INITIAL_DELAY);
        return () => clearTimeout(t);
      }, []);

      return (
        <h1 className={className} style={style}>
          {lines.map((line, lineIndex) => (
            <span key={lineIndex} className="block">
              {line.split('').map((char, charIndex) => {
                const stagger =
                  lineIndex * line.length * CHAR_DELAY + charIndex * CHAR_DELAY;
                return (
                  <span
                    key={`${lineIndex}-${charIndex}`}
                    className="inline-block"
                    style={{
                      opacity: started ? 1 : 0,
                      transform: started ? 'translateX(0)' : 'translateX(-18px)',
                      transition: `opacity ${TRANSITION_MS}ms ease, transform ${TRANSITION_MS}ms ease`,
                      transitionDelay: `${stagger}ms`,
                    }}
                  >
                    {char === ' ' ? '\u00A0' : char}
                  </span>
                );
              })}
            </span>
          ))}
        </h1>
      );
    }

    /* ── App logo (same mark + wordmark as synapses app sidebar) ── */
    function SynapsesLogoMark({ size = 36, id = 'sLG' }) {
      return (
        <svg width={size} height={size} viewBox="0 0 80 80" fill="none" aria-hidden="true">
          <defs>
            <radialGradient id={id} cx="38%" cy="35%" r="65%">
              <stop offset="0%" stopColor="#c7d2fe" />
              <stop offset="40%" stopColor="#818cf8" />
              <stop offset="100%" stopColor="#4338ca" />
            </radialGradient>
            <filter id={`${id}-glow`}>
              <feGaussianBlur stdDeviation="1.5" result="blur" />
              <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>
          </defs>
          <line x1="40" y1="34" x2="40" y2="8" stroke="#a5b4fc" strokeWidth="1.6" strokeLinecap="round">
            <animate attributeName="opacity" values="0.8;0.8;0.2;0.8;0.8" dur="7s" repeatCount="indefinite" />
          </line>
          <line x1="40" y1="46" x2="40" y2="72" stroke="#a5b4fc" strokeWidth="1.6" strokeLinecap="round">
            <animate attributeName="opacity" values="0.8;0.8;0.8;0.1;0.8" dur="9s" repeatCount="indefinite" />
          </line>
          <line x1="35" y1="37" x2="10" y2="28" stroke="#818cf8" strokeWidth="1.6" strokeLinecap="round">
            <animate attributeName="opacity" values="0.8;0.8;0.3;0.8;0.8" dur="11s" repeatCount="indefinite" />
          </line>
          <line x1="45" y1="37" x2="70" y2="28" stroke="#818cf8" strokeWidth="1.6" strokeLinecap="round">
            <animate attributeName="opacity" values="0.8;0.1;0.8;0.8;0.8" dur="8s" repeatCount="indefinite" />
          </line>
          <line x1="35" y1="45" x2="16" y2="62" stroke="#a5b4fc" strokeWidth="1.6" strokeLinecap="round">
            <animate attributeName="opacity" values="0.8;0.8;0.8;0.2;0.8" dur="6s" repeatCount="indefinite" />
          </line>
          <line x1="45" y1="45" x2="64" y2="62" stroke="#a5b4fc" strokeWidth="1.6" strokeLinecap="round">
            <animate attributeName="opacity" values="0.8;0.8;0.4;0.8;0.8" dur="10s" repeatCount="indefinite" />
          </line>
          <circle cx="40" cy="8" r="3" filter={`url(#${id}-glow)`}>
            <animate attributeName="fill" values="#a5b4fc;#a5b4fc;#ffffff;#a5b4fc;#a5b4fc" dur="8s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="1;1;0.05;1;1" dur="8s" repeatCount="indefinite" />
          </circle>
          <circle cx="40" cy="72" r="3" filter={`url(#${id}-glow)`}>
            <animate attributeName="fill" values="#a5b4fc;#a5b4fc;#a5b4fc;#00d9ff;#a5b4fc" dur="11s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="1;1;0.05;1;1" dur="11s" repeatCount="indefinite" />
          </circle>
          <circle cx="10" cy="28" r="3" filter={`url(#${id}-glow)`}>
            <animate attributeName="fill" values="#818cf8;#818cf8;#ffffff;#818cf8;#818cf8" dur="6.5s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="1;0.05;1;1;1" dur="6.5s" repeatCount="indefinite" />
          </circle>
          <circle cx="70" cy="28" r="3" filter={`url(#${id}-glow)`}>
            <animate attributeName="fill" values="#818cf8;#818cf8;#818cf8;#00d9ff;#818cf8" dur="9.5s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="1;1;1;0.05;1" dur="9.5s" repeatCount="indefinite" />
          </circle>
          <circle cx="16" cy="62" r="3" filter={`url(#${id}-glow)`}>
            <animate attributeName="fill" values="#a5b4fc;#a5b4fc;#ffffff;#a5b4fc;#a5b4fc" dur="12s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="1;1;0.05;1;1" dur="12s" repeatCount="indefinite" />
          </circle>
          <circle cx="64" cy="62" r="3" filter={`url(#${id}-glow)`}>
            <animate attributeName="fill" values="#a5b4fc;#00d9ff;#a5b4fc;#a5b4fc;#a5b4fc" dur="7.5s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="1;1;1;0.05;1" dur="7.5s" repeatCount="indefinite" />
          </circle>
          <circle cx="40" cy="40" r="11" fill={`url(#${id})`}>
            <animate attributeName="opacity" values="0.9;1;0.85;1;0.9" dur="6s" repeatCount="indefinite" />
          </circle>
          <circle cx="40" cy="40" r="4.5" fill="#c7d2fe" opacity="0.9">
            <animate attributeName="r" values="4.5;5;4.5;5.2;4.5" dur="6s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0.9;1;0.8;1;0.9" dur="6s" repeatCount="indefinite" />
          </circle>
        </svg>
      );
    }

    function SynapsesWordmark({ compact = false }) {
      return (
        <span
          className="font-logo font-bold tracking-tight leading-none"
          style={{
            fontSize: compact ? 16 : 17,
            color: '#ffffff',
          }}
        >
          Synapses
        </span>
      );
    }

    /* ── Icons ── */
    const ArrowUpRight = ({ className = 'h-5 w-5', size = 20 }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} aria-hidden="true">
        <path d="M7 17L17 7" /><path d="M7 7h10v10" />
      </svg>
    );

    const PhoneIcon = ({ className = 'h-4 w-4', size = 16 }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} aria-hidden="true">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.38 2 2 0 0 1 3.6 1.21h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 8.35a16 16 0 0 0 6 6l1.5-1.5a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 14.92z" />
      </svg>
    );

    /* ── Scroll-in secondary nav (popup) ── */
    const FLOAT_NAV = ['Ava', 'Voice', 'Memory', 'Companion'];

    function FloatNavbar({ visible }) {
      return (
        <nav
          className="fixed top-4 left-0 right-0 z-50 px-8 lg:px-16 flex items-center justify-between font-sans pointer-events-none"
          style={{
            opacity: visible ? 1 : 0,
            transform: visible ? 'translateY(0)' : 'translateY(-12px)',
            transition: 'opacity 400ms ease, transform 400ms ease',
            pointerEvents: visible ? 'auto' : 'none',
          }}
          aria-hidden={!visible}
        >
          <a
            href="#top"
            className="liquid-glass flex items-center rounded-full px-4 py-2 shrink-0 pointer-events-auto"
            aria-label="Synapses home"
          >
            <SynapsesWordmark compact />
          </a>

          <div className="hidden md:flex items-center liquid-glass rounded-full px-1.5 py-1.5 pointer-events-auto">
            {FLOAT_NAV.map((label) => (
              <a
                key={label}
                href={label === 'Ava' ? '#features' : '#features'}
                className="px-3 py-2 text-sm font-medium text-white/90 transition-colors hover:text-gray-300"
              >
                {label}
              </a>
            ))}
            <a
              href={APP.open}
              className="ml-1 inline-flex items-center gap-1.5 bg-white text-black rounded-full px-4 py-2 text-sm font-medium whitespace-nowrap transition-colors hover:bg-gray-100"
            >
              Meet Ava
              <ArrowUpRight className="h-4 w-4" size={16} />
            </a>
          </div>

          <div className="w-12 h-12 shrink-0" aria-hidden="true" />
        </nav>
      );
    }

    /* ── Hero ── */
    // Hero background — local clip from videos/
    const HERO_VIDEO = 'videos/space.mp4';

    const TOP_NAV = ['Companion', 'Ava', 'Voice', 'Features', 'Pricing'];

    function Hero() {
      return (
        <section id="top" className="relative min-h-screen w-full bg-black overflow-hidden text-white font-sans">
          <video
            src={HERO_VIDEO}
            autoPlay
            loop
            muted
            playsInline
            className="absolute inset-0 w-full h-full object-cover z-0"
          />

          <div className="relative z-10 flex flex-col min-h-screen">
            {/* Top nav */}
            <div className="px-6 md:px-12 lg:px-16 pt-6">
              <nav className="liquid-glass rounded-xl px-4 py-2 flex items-center justify-between">
                <a href="#top" className="shrink-0" aria-label="Synapses home">
                  <SynapsesWordmark />
                </a>

                <div className="hidden md:flex items-center gap-8">
                  {TOP_NAV.map((label) => (
                    <a
                      key={label}
                      href={label === 'Pricing' ? '#cta' : '#features'}
                      className="text-sm text-white transition-colors hover:text-gray-300"
                    >
                      {label}
                    </a>
                  ))}
                </div>

                <a
                  href={APP.open}
                  className="bg-white text-black px-6 py-2 rounded-lg text-sm font-medium transition-colors hover:bg-gray-100"
                >
                  Meet Ava
                </a>
              </nav>
            </div>

            {/* Bottom hero content */}
            <div className="flex-1 flex flex-col justify-end px-6 md:px-12 lg:px-16 pb-12 lg:pb-16">
              <div className="lg:grid lg:grid-cols-2 lg:items-end gap-8">
                <div>
                  <AnimatedHeading
                    text={"Your AI companion\nfor the long run."}
                    className="text-4xl md:text-5xl lg:text-6xl xl:text-7xl font-normal mb-4 text-white"
                    style={{ letterSpacing: '-0.04em' }}
                  />

                  <FadeIn delay={800} duration={1000}>
                    <p className="text-base md:text-lg text-gray-300 mb-5 max-w-xl">
                      Synapses is Ava first — a companion that talks, listens, and remembers.
                      Chat, live voice, or call her anytime. Everything else is there when you need it.
                    </p>
                  </FadeIn>

                  <FadeIn delay={1200} duration={1000}>
                    <div className="flex flex-wrap gap-4">
                      <a
                        href={APP.open}
                        className="bg-white text-black px-8 py-3 rounded-lg font-medium transition-colors hover:bg-gray-100 inline-flex items-center gap-2"
                      >
                        Start with Ava
                        <ArrowUpRight className="h-5 w-5" size={20} />
                      </a>
                      <a
                        href={APP.avaPhone}
                        className="liquid-glass border border-white/20 text-white px-8 py-3 rounded-lg font-medium transition-colors hover:bg-white hover:text-black inline-flex items-center gap-2"
                      >
                        <PhoneIcon className="h-4 w-4" size={16} />
                        Talk to Ava
                      </a>
                    </div>
                    <p className="mt-4 text-xs text-white/50 font-medium tracking-wide">
                      Free plan · Pro from $12/mo · No credit card
                    </p>
                  </FadeIn>
                </div>

                <div className="flex items-end justify-start lg:justify-end mt-8 lg:mt-0">
                  <FadeIn delay={1400} duration={1000}>
                    <div className="liquid-glass border border-white/20 px-3.5 py-1.5 rounded-full">
                      <p className="text-xs md:text-sm font-medium tracking-wide text-white/80 font-sans">
                        Companion first. Always.
                      </p>
                    </div>
                  </FadeIn>
                </div>
              </div>
            </div>
          </div>
        </section>
      );
    }

    /* ── Companion section (Ava portrait, no full-bleed bg video) ── */
    const AVA_PORTRAIT = 'videos/ava-portrait.mp4';
    const AVA_POSTER = 'videos/ava-poster.png';

    const FEATURES = [
      {
        title: 'Ava',
        body: 'Your AI companion — not a generic chatbot. She talks with you, remembers context, and stays with you across chat, voice, and phone.',
        tags: ['Companion', 'Memory', 'Always on', 'Real talk'],
        glyph: '✦',
      },
      {
        title: 'Voice & Call',
        body: 'Full voice in and out — and you can call Ava on the phone. A companion you can actually talk to, not just type at.',
        tags: ['Live Voice', 'Phone', 'Lip-sync', 'Hands-free'],
        glyph: '◎',
      },
      {
        title: 'When you need more',
        body: 'Tools, sourcing, jobs, hub, notes — still in one place. Secondary to the companion, ready when you are.',
        tags: ['Tools', 'Sourcing', 'Jobs', 'Hub'],
        glyph: '⬡',
      },
    ];

    function FeatureCard({ title, body, tags, glyph, index }) {
      const [shown, setShown] = useState(false);
      const ref = useRef(null);

      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(
          ([entry]) => {
            if (entry.isIntersecting) {
              setTimeout(() => setShown(true), index * 100);
              obs.disconnect();
            }
          },
          { threshold: 0.15 }
        );
        obs.observe(el);
        return () => obs.disconnect();
      }, [index]);

      return (
        <div
          ref={ref}
          className="liquid-glass rounded-2xl p-5 md:p-6 min-h-[280px] flex flex-col transition-all duration-700"
          style={{
            opacity: shown ? 1 : 0,
            transform: shown ? 'translateY(0)' : 'translateY(20px)',
            filter: shown ? 'blur(0px)' : 'blur(8px)',
          }}
        >
          <div className="flex items-start justify-between gap-3">
            <div className="w-9 h-9 rounded-xl border border-white/10 bg-white/[0.03] flex items-center justify-center shrink-0 text-white/80 text-sm">
              {glyph}
            </div>
            <div className="flex flex-wrap justify-end gap-1.5 max-w-[75%]">
              {tags.map((tag) => (
                <span
                  key={tag}
                  className="rounded-full px-2.5 py-0.5 text-[10px] tracking-wide text-white/50 border border-white/10 whitespace-nowrap"
                >
                  {tag}
                </span>
              ))}
            </div>
          </div>

          <div className="flex-1" />

          <div className="mt-5">
            <h3
              className="text-white text-2xl md:text-[1.75rem] font-normal leading-none"
              style={{ letterSpacing: '-0.03em' }}
            >
              {title}
            </h3>
            <p className="mt-2.5 text-[13px] text-white/50 font-normal leading-relaxed max-w-[34ch]">
              {body}
            </p>
          </div>
        </div>
      );
    }

    function Features() {
      return (
        <section id="features" className="relative min-h-screen w-full overflow-hidden features-ambient">
          <div className="relative z-10 px-5 sm:px-8 md:px-12 pt-20 md:pt-24 pb-12 flex flex-col min-h-screen">
            {/* Copy + phone pulled into center as one cluster */}
            <div className="ava-hero-cluster mb-auto pt-4 md:pt-8">
              <div className="ava-hero-copy">
                <p className="text-[11px] uppercase tracking-[0.18em] text-white/45 mb-4 font-medium">
                  Companion
                </p>
                <h2
                  className="text-white text-4xl sm:text-5xl md:text-[3.25rem] lg:text-[3.75rem] leading-[1.05] font-normal"
                  style={{ letterSpacing: '-0.035em' }}
                >
                  Built around
                  <br />
                  Ava
                </h2>
                <p className="mt-4 text-[15px] md:text-base text-white/55 max-w-sm mx-auto md:mx-0 font-normal leading-relaxed">
                  Meet your companion — she talks, listens, and remembers.
                  Everything else supports her.
                </p>
                <a
                  href={APP.open}
                  className="mt-6 inline-flex items-center gap-2 bg-white text-black px-6 py-2.5 rounded-full text-sm font-medium transition-colors hover:bg-gray-100"
                >
                  Talk with Ava
                  <ArrowUpRight className="h-4 w-4" size={16} />
                </a>
              </div>

              <div className="ava-stage">
                <div className="ava-phone-chrome">
                  <div className="ava-portrait-frame">
                    <video
                      src={AVA_PORTRAIT}
                      poster={AVA_POSTER}
                      autoPlay
                      loop
                      muted
                      playsInline
                    />
                    <div className="ava-portrait-fade" />
                  </div>
                </div>
                <div className="ava-caption">
                  <p className="ava-caption-name">Ava</p>
                  <p className="ava-caption-sub">AI companion</p>
                </div>
              </div>
            </div>

            <div className="grid grid-cols-1 md:grid-cols-3 gap-4 md:gap-5 mt-14 max-w-6xl mx-auto w-full">
              {FEATURES.map((f, i) => (
                <FeatureCard key={f.title} {...f} index={i} />
              ))}
            </div>
          </div>
        </section>
      );
    }

    /* ── Modules strip (maps to real app sections) ── */
    const MODULES = [
      { id: 'ava', label: 'Ava Companion', desc: 'The heart of Synapses — chat that knows you' },
      { id: 'voice', label: 'Live Voice', desc: 'Talk out loud; she talks back' },
      { id: 'call', label: 'Phone Call', desc: 'Call Ava when you need her' },
      { id: 'memory', label: 'Memory', desc: 'Context that follows you' },
      { id: 'tools', label: 'AI Tools', desc: 'There when you need them' },
      { id: 'sourcing', label: 'Sourcing', desc: 'Optional deep-work agent' },
      { id: 'health', label: 'Health AI', desc: 'Reflect and recharge with her' },
      { id: 'notes', label: 'Notes', desc: 'Capture mid-conversation' },
    ];

    function Modules() {
      return (
        <section id="modules" className="relative bg-black py-24 px-6 md:px-12 lg:px-16">
          <div className="max-w-6xl mx-auto">
            <p className="text-sm text-white/60 mb-4">// Inside the app</p>
            <h2 className="text-4xl md:text-5xl font-normal tracking-tight text-white mb-4" style={{ letterSpacing: '-0.03em' }}>
              Companion first. Rest when you need it.
            </h2>
            <p className="text-gray-300 text-base md:text-lg font-light max-w-2xl mb-12">
              Ava is the center. These are the rooms around her — same modules as the app.
            </p>

            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
              {MODULES.map((m) => (
                <a
                  key={m.id}
                  href={APP.open}
                  className="liquid-glass border border-white/10 rounded-2xl p-5 transition-colors hover:bg-white/5 group"
                >
                  <div className="flex items-center justify-between mb-3">
                    <span className="text-xs font-medium tracking-widest uppercase text-white/50">{m.id}</span>
                    <ArrowUpRight className="h-4 w-4 text-white/40 group-hover:text-white transition-colors" size={16} />
                  </div>
                  <h3 className="text-lg font-medium text-white mb-1">{m.label}</h3>
                  <p className="text-sm text-white/60 font-light leading-snug">{m.desc}</p>
                </a>
              ))}
            </div>
          </div>
        </section>
      );
    }

    /* ── Bottom CTA ── */
    function FinalCta() {
      return (
        <section id="cta" className="relative bg-black py-28 px-6 md:px-12 lg:px-16 overflow-hidden">
          <div className="max-w-3xl mx-auto text-center">
            <h2
              className="text-4xl md:text-5xl lg:text-6xl font-normal text-white mb-6"
              style={{ letterSpacing: '-0.04em' }}
            >
              Meet your companion
              <br />
              for real
            </h2>
            <p className="text-gray-300 text-base md:text-lg font-light mb-10 max-w-lg mx-auto">
              Start a conversation with Ava. Free to start, no credit card needed.
            </p>
            <div className="flex flex-wrap items-center justify-center gap-4">
              <a
                href={APP.open}
                className="bg-white text-black px-8 py-3 rounded-lg font-medium transition-colors hover:bg-gray-100 inline-flex items-center gap-2"
              >
                Start with Ava
                <ArrowUpRight className="h-5 w-5" size={20} />
              </a>
              <a
                href={APP.avaPhone}
                className="liquid-glass border border-white/20 text-white px-8 py-3 rounded-lg font-medium transition-colors hover:bg-white hover:text-black inline-flex items-center gap-2"
              >
                <PhoneIcon className="h-4 w-4" size={16} />
                Talk to Ava
              </a>
            </div>
            <p className="mt-6 text-xs text-white/40">Free plan · Pro from $12/mo · No setup fees</p>
          </div>
        </section>
      );
    }

    function Footer() {
      return (
        <footer className="border-t border-white/10 px-6 md:px-12 lg:px-16 py-10 flex flex-col sm:flex-row items-center justify-between gap-4">
          <SynapsesWordmark compact />
          <div className="flex flex-wrap items-center justify-center gap-6 text-sm text-white/50">
            <a href="#features" className="hover:text-white transition-colors">Features</a>
            <a href="#modules" className="hover:text-white transition-colors">App modules</a>
            <a href={APP.open} className="hover:text-white transition-colors">Open app</a>
            <a href={APP.avaPhone} className="hover:text-white transition-colors">Talk to Ava</a>
          </div>
          <span className="text-xs text-white/30">© {new Date().getFullYear()} Synapses</span>
        </footer>
      );
    }

    /* ── App shell ── */
    function App() {
      const [showFloatNav, setShowFloatNav] = useState(false);

      useEffect(() => {
        const onScroll = () => {
          const features = document.getElementById('features');
          if (!features) return;
          setShowFloatNav(features.getBoundingClientRect().top <= 80);
        };
        onScroll();
        window.addEventListener('scroll', onScroll, { passive: true });
        window.addEventListener('resize', onScroll);
        return () => {
          window.removeEventListener('scroll', onScroll);
          window.removeEventListener('resize', onScroll);
        };
      }, []);

      return (
        <main className="bg-black text-white min-h-screen font-sans">
          <FloatNavbar visible={showFloatNav} />
          <Hero />
          <Features />
          <Modules />
          <FinalCta />
          <Footer />
        </main>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
